<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="nib" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <!-- Quill pen nib -->
  <g transform="translate(512, 512) rotate(-45)">
    <!-- Main nib body -->
    <path d="M 0,-320 C 60,-280 80,-160 80,-40 L 80,180 C 80,200 60,240 0,320 C -60,240 -80,200 -80,180 L -80,-40 C -80,-160 -60,-280 0,-320 Z" fill="url(#nib)" opacity="0.95"/>
    <!-- Center slit -->
    <line x1="0" y1="-100" x2="0" y2="240" stroke="#4338ca" stroke-width="6" opacity="0.4"/>
    <!-- Breather hole -->
    <circle cx="0" cy="-60" r="14" fill="#4338ca" opacity="0.35"/>
  </g>
  <!-- Ink drop at the tip -->
  <circle cx="512" cy="778" r="28" fill="#ffffff" opacity="0.9"/>
  <circle cx="512" cy="818" r="14" fill="#ffffff" opacity="0.6"/>
</svg>
